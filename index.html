<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>derp_3d - v3</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #eeeeee;
            user-select: none;
            touch-action: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        .panel {
            background: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 12px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: #00ffcc;
        }

        #controls-sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 6px;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 5px;
        }

        button {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #3a3a3a;
            border-color: #00ffcc;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
        }

        button.danger:hover {
            background: #a32a2a;
            border-color: #ff4444;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        input[type=range] {
            flex: 1;
            accent-color: #00ffcc;
            background: #333;
            height: 6px;
            border-radius: 3px;
        }

        input[type=color] {
            border: none;
            width: 40px;
            height: 24px;
            border-radius: 4px;
            background: none;
            cursor: pointer;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
            align-self: center;
            background: rgba(20, 20, 20, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            #ui-container { padding: 8px; }
            #controls-sidebar { width: 210px; font-size: 0.8rem; }
            button { padding: 8px 6px; font-size: 0.75rem; }
            footer { display: none; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <header class="panel" style="align-self: flex-start;">
            <h1>derp_3d <span style="color:#888; font-size: 0.75rem;">v3.0</span></h1>
        </header>

        <div id="controls-sidebar" class="panel">
            <div>
                <div class="section-title">History</div>
                <div class="btn-group">
                    <button id="undo-btn" disabled>Undo</button>
                    <button id="redo-btn" disabled>Redo</button>
                </div>
            </div>

            <div>
                <div class="section-title">Add Geometry</div>
                <div class="btn-group">
                    <button id="add-cube-btn">+ Cube</button>
                    <button id="add-pyramid-btn">+ Pyramid</button>
                </div>
                <div class="btn-group">
                    <button id="delete-cube-btn" class="danger">Delete Selected</button>
                </div>
                <div class="setting-row">
                    <label>Object Color</label>
                    <input type="color" id="mesh-color" value="#8899aa">
                </div>
            </div>

            <div>
                <div class="section-title">Scale Selected</div>
                <div class="setting-row"><label style="color:#ff4444">X</label><input type="range" id="scale-x" min="0.1" max="5" step="0.1" value="1"></div>
                <div class="setting-row"><label style="color:#44ff44">Y</label><input type="range" id="scale-y" min="0.1" max="5" step="0.1" value="1"></div>
                <div class="setting-row"><label style="color:#4444ff">Z</label><input type="range" id="scale-z" min="0.1" max="5" step="0.1" value="1"></div>
            </div>

            <div>
                <div class="section-title">Height (Y Position)</div>
                <div class="setting-row">
                    <label>Elevation</label>
                    <input type="range" id="pos-y" min="0" max="10" step="0.1" value="0.5">
                </div>
            </div>

            <div>
                <div class="section-title">Environment</div>
                <div class="setting-row">
                    <label>Background</label>
                    <input type="color" id="bg-color" value="#1e1e1e">
                </div>
            </div>

            <div>
                <div class="section-title">Storage</div>
                <div class="btn-group">
                    <button id="save-btn">Save Project</button>
                    <button id="load-btn">Load Project</button>
                </div>
            </div>
        </div>

        <footer>
            <b>Left Click:</b> Select object / Orbit room | <b>Shift + Left Click & Drag:</b> Move object on ground | <b>Right Click:</b> Pan camera
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- Core Scene Initialization ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights & Helpers ---
        const ambientLight = new THREE.AmbientLight(0x777777, 0.7);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00ffcc, 0x444444);
        scene.add(gridHelper);

        // Invisible plane used to calculate mouse drag positions on the floor floor
        const dragPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        dragPlane.rotation.x = -Math.PI / 2;
        scene.add(dragPlane);

        // Trackers
        let objectsList = [];
        let selectedObject = null;
        let isDraggingObject = false;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Highlighting Visual Outline Box (A bounding box helper handles mismatched dimensions automatically)
        const selectionBox = new THREE.BoxHelper(new THREE.Mesh(), 0x00ffcc);
        selectionBox.visible = false;
        scene.add(selectionBox);

        // --- History Engine System ---
        const undoStack = [];
        const redoStack = [];

        function saveHistoryState() {
            const state = objectsList.map(obj => ({
                type: obj.geometry.type, // Tracks if BoxGeometry or ConeGeometry
                position: obj.position.clone(),
                scale: obj.scale.clone(),
                color: obj.material.color.getHexString(),
                id: obj.uuid
            }));
            undoStack.push(JSON.stringify(state));
            redoStack.length = 0;
            updateHistoryButtons();
        }

        function undo() {
            if (undoStack.length === 0) return;
            recordCurrentToStack(redoStack);
            applyStateJSON(JSON.parse(undoStack.pop()));
            updateHistoryButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            recordCurrentToStack(undoStack);
            applyStateJSON(JSON.parse(redoStack.pop()));
            updateHistoryButtons();
        }

        function recordCurrentToStack(stack) {
            const current = objectsList.map(obj => ({
                type: obj.geometry.type,
                position: obj.position.clone(),
                scale: obj.scale.clone(),
                color: obj.material.color.getHexString(),
                id: obj.uuid
            }));
            stack.push(JSON.stringify(current));
        }

        function applyStateJSON(stateArray) {
            objectsList.forEach(obj => scene.remove(obj));
            objectsList = [];
            selectObject(null);

            stateArray.forEach(data => {
                let geom;
                // Detect whether object was a cube or a pyramid
                if (data.type === 'ConeGeometry') {
                    geom = new THREE.ConeGeometry(0.7, 1, 4);
                    geom.rotateX(0); // Ensure point faces straight up
                } else {
                    geom = new THREE.BoxGeometry(1, 1, 1);
                }
                
                const mat = new THREE.MeshStandardMaterial({ color: parseInt(data.color, 16), roughness: 0.4 });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.copy(data.position);
                mesh.scale.copy(data.scale);
                mesh.uuid = data.id;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                objectsList.push(mesh);
            });
        }

        function updateHistoryButtons() {
            document.getElementById('undo-btn').disabled = (undoStack.length === 0);
            document.getElementById('redo-btn').disabled = (redoStack.length === 0);
        }

        // --- Core Spawning Logic ---

        function spawnMesh(type) {
            saveHistoryState();
            
            let geometry;
            if (type === 'pyramid') {
                // A cone with 4 radial segments makes a clean pyramid geometry
                geometry = new THREE.ConeGeometry(0.7, 1, 4);
                // Shift baseline geometry coordinate tracking up so base sits nicely at pivot floor
                geometry.translate(0, 0.5, 0); 
            } else {
                geometry = new THREE.BoxGeometry(1, 1, 1);
                geometry.translate(0, 0.5, 0);
            }

            const activeColor = document.getElementById('mesh-color').value;
            const material = new THREE.MeshStandardMaterial({ color: activeColor, roughness: 0.4 });
            const mesh = new THREE.Mesh(geometry, material);
            
            const offset = (Math.random() - 0.5) * 2;
            mesh.position.set(offset, 0, offset);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            scene.add(mesh);
            objectsList.push(mesh);
            selectObject(mesh);
        }

        function deleteSelected() {
            if (selectedObject) {
                saveHistoryState();
                scene.remove(selectedObject);
                objectsList = objectsList.filter(o => o !== selectedObject);
                selectObject(null);
            }
        }

        function selectObject(object) {
            selectedObject = object;
            if (selectedObject) {
                selectionBox.setFromObject(selectedObject);
                selectionBox.visible = true;
                
                document.getElementById('scale-x').value = selectedObject.scale.x;
                document.getElementById('scale-y').value = selectedObject.scale.y;
                document.getElementById('scale-z').value = selectedObject.scale.z;
                document.getElementById('pos-y').value = selectedObject.position.y;
                document.getElementById('mesh-color').value = "#" + selectedObject.material.color.getHexString();
            } else {
                selectionBox.visible = false;
            }
        }

        // --- Dragging & Input Systems Handling ---

        function updateMouseCoordinates(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            updateMouseCoordinates(e);

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objectsList);

            if (intersects.length > 0) {
                const hitObject = intersects[0].object;
                selectObject(hitObject);

                // If holding Shift key, engage Drag-to-Move instead of Camera Orbiting
                if (e.shiftKey) {
                    isDraggingObject = true;
                    controls.enabled = false; // Disable viewport spinning while rearranging scene
                    saveHistoryState();
                }
            } else {
                // Clicked blank space, keep selection box updated but clear handles if required
                if(!e.shiftKey) selectObject(null);
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingObject || !selectedObject) return;
            updateMouseCoordinates(e);

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(dragPlane);

            if (intersects.length > 0) {
                // Snaps object's X & Z coordinates straight onto the imaginary floor map vector
                const pointOnFloor = intersects[0].point;
                selectedObject.position.x = pointOnFloor.x;
                selectedObject.position.z = pointOnFloor.z;
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDraggingObject) {
                isDraggingObject = false;
                controls.enabled = true; // Give camera viewport controls back to user
                if (selectedObject) selectObject(selectedObject);
            }
        });

        // Event Hook listeners
        document.getElementById('add-cube-btn').addEventListener('click', () => spawnMesh('cube'));
        document.getElementById('add-pyramid-btn').addEventListener('click', () => spawnMesh('pyramid'));
        document.getElementById('delete-cube-btn').addEventListener('click', deleteSelected);
        document.getElementById('undo-btn').addEventListener('click', undo);
        document.getElementById('redo-btn').addEventListener('click', redo);

        // Scale updates adjustment
        function updateScale() {
            if (selectedObject) {
                const x = parseFloat(document.getElementById('scale-x').value);
                const y = parseFloat(document.getElementById('scale-y').value);
                const z = parseFloat(document.getElementById('scale-z').value);
                selectedObject.scale.set(x, y, z);
                selectionBox.setFromObject(selectedObject);
            }
        }
        ['scale-x', 'scale-y', 'scale-z'].forEach(id => document.getElementById(id).addEventListener('input', updateScale));

        // Elevation adjustment slider
        document.getElementById('pos-y').addEventListener('input', (e) => {
            if (selectedObject) {
                selectedObject.position.y = parseFloat(e.target.value);
                selectionBox.setFromObject(selectedObject);
            }
        });

        // Coloring triggers
        document.getElementById('mesh-color').addEventListener('input', (e) => {
            if (selectedObject) {
                selectedObject.material.color.set(e.target.value);
            }
        });
        document.getElementById('bg-color').addEventListener('input', (e) => {
            scene.background.set(e.target.value);
        });

        // Storage Save / Load 
        document.getElementById('save-btn').addEventListener('click', () => {
            const projectData = objectsList.map(obj => ({
                type: obj.geometry.type,
                position: [obj.position.x, obj.position.y, obj.position.z],
                scale: [obj.scale.x, obj.scale.y, obj.scale.z],
                color: obj.material.color.getHexString()
            }));
            localStorage.setItem('derp_3d_scenes', JSON.stringify(projectData));
            alert('Scene package stored inside browser layout successfully!');
        });

        document.getElementById('load-btn').addEventListener('click', () => {
            const rawData = localStorage.getItem('derp_3d_scenes');
            if (!rawData) return alert('No workspace state payload detected!');
            saveHistoryState();
            applyStateJSON(JSON.parse(rawData));
        });

        // Hotkeys shortcuts
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
            if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialization runtime loop
        spawnMesh('cube');
        undoStack.length = 0;
        updateHistoryButtons();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (selectedObject && !isDraggingObject) {
                selectionBox.update();
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
