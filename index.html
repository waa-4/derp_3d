<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>derp_3d - v2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #eeeeee;
            user-select: none;
            touch-action: none; /* Prevents default mobile scrolling */
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        .panel {
            background: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 12px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: #00ffcc;
        }

        #controls-sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 6px;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 5px;
        }

        button {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #3a3a3a;
            border-color: #00ffcc;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
        }

        button.danger:hover {
            background: #a32a2a;
            border-color: #ff4444;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        input[type=range] {
            flex: 1;
            accent-color: #00ffcc;
            background: #333;
            height: 6px;
            border-radius: 3px;
        }

        input[type=color] {
            border: none;
            width: 40px;
            height: 24px;
            border-radius: 4px;
            background: none;
            cursor: pointer;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
            align-self: center;
            background: rgba(20, 20, 20, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: auto;
        }

        /* Mobile specific style tweaks */
        @media (max-width: 768px) {
            #ui-container { padding: 8px; }
            #controls-sidebar { width: 210px; font-size: 0.8rem; }
            button { padding: 8px 6px; font-size: 0.75rem; }
            footer { display: none; } /* Hide keys guide on mobile */
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <header class="panel" style="align-self: flex-start;">
            <h1>derp_3d <span style="color:#888; font-size: 0.75rem;">v2.0</span></h1>
        </header>

        <div id="controls-sidebar" class="panel">
            <div>
                <div class="section-title">History</div>
                <div class="btn-group">
                    <button id="undo-btn" disabled>Undo</button>
                    <button id="redo-btn" disabled>Redo</button>
                </div>
            </div>

            <div>
                <div class="section-title">Objects</div>
                <div class="btn-group">
                    <button id="add-cube-btn">+ Cube</button>
                    <button id="delete-cube-btn" class="danger">Delete</button>
                </div>
                <div class="setting-row">
                    <label>Mesh Color</label>
                    <input type="color" id="mesh-color" value="#8899aa">
                </div>
            </div>

            <div>
                <div class="section-title">Scale Selected</div>
                <div class="setting-row"><label style="color:#ff4444">X</label><input type="range" id="scale-x" min="0.1" max="5" step="0.1" value="1"></div>
                <div class="setting-row"><label style="color:#44ff44">Y</label><input type="range" id="scale-y" min="0.1" max="5" step="0.1" value="1"></div>
                <div class="setting-row"><label style="color:#4444ff">Z</label><input type="range" id="scale-z" min="0.1" max="5" step="0.1" value="1"></div>
            </div>

            <div>
                <div class="section-title">Environment</div>
                <div class="setting-row">
                    <label>Background</label>
                    <input type="color" id="bg-color" value="#1e1e1e">
                </div>
                <div class="setting-row">
                    <label>Ambient Light</label>
                    <input type="range" id="ambient-intensity" min="0" max="2" step="0.1" value="0.6">
                </div>
                <div class="setting-row">
                    <label>Sun Light</label>
                    <input type="range" id="sun-intensity" min="0" max="3" step="0.1" value="0.8">
                </div>
            </div>

            <div>
                <div class="section-title">Storage</div>
                <div class="btn-group">
                    <button id="save-btn">Save project</button>
                    <button id="load-btn">Load project</button>
                </div>
            </div>
        </div>

        <footer>
            Left Click: Select/Orbit | Right Click: Pan | Scroll: Zoom <br>
            <span style="color:#00ffcc; font-weight:bold;">Mobile:</span> One finger to Orbit, Two fingers to Pinch/Pan
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- Core Scene Initialization ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance cap
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Orbit controls built-in touch navigation support for mobile out-of-the-box
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Custom Systems Setup ---
        const ambientLight = new THREE.AmbientLight(0x666666, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00ffcc, 0x444444);
        scene.add(gridHelper);

        let cubes = [];
        let selectedObject = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Highlighting Box
        const selectionBox = new THREE.Mesh(
            new THREE.BoxGeometry(1.02, 1.02, 1.02),
            new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.8 })
        );
        selectionBox.visible = false;
        scene.add(selectionBox);

        // --- Undo / Redo History Engine ---
        const undoStack = [];
        const redoStack = [];

        function saveHistoryState() {
            const state = cubes.map(c => ({
                position: c.position.clone(),
                scale: c.scale.clone(),
                color: c.material.color.getHexString(),
                id: c.uuid
            }));
            undoStack.push(JSON.stringify(state));
            redoStack.length = 0; // Clear Redo history on new structural action
            updateHistoryButtons();
        }

        function undo() {
            if (undoStack.length === 0) return;
            // Push current state to redo
            const currentState = cubes.map(c => ({
                position: c.position.clone(),
                scale: c.scale.clone(),
                color: c.material.color.getHexString(),
                id: c.uuid
            }));
            redoStack.push(JSON.stringify(currentState));

            const targetState = JSON.parse(undoStack.pop());
            applyStateJSON(targetState);
            updateHistoryButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const targetState = JSON.parse(redoStack.pop());
            
            const currentState = cubes.map(c => ({
                position: c.position.clone(),
                scale: c.scale.clone(),
                color: c.material.color.getHexString(),
                id: c.uuid
            }));
            undoStack.push(JSON.stringify(currentState));
            
            applyStateJSON(targetState);
            updateHistoryButtons();
        }

        function applyStateJSON(stateArray) {
            // Clear current objects
            cubes.forEach(c => scene.remove(c));
            cubes = [];
            selectObject(null);

            // Rebuild from snapshot records
            stateArray.forEach(data => {
                const geom = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({ color: parseInt(data.color, 16), roughness: 0.4 });
                const cube = new THREE.Mesh(geom, mat);
                cube.position.copy(data.position);
                cube.scale.copy(data.scale);
                cube.uuid = data.id;
                cube.castShadow = true;
                cube.receiveShadow = true;
                scene.add(cube);
                cubes.push(cube);
            });
        }

        function updateHistoryButtons() {
            document.getElementById('undo-btn').disabled = (undoStack.length === 0);
            document.getElementById('redo-btn').disabled = (redoStack.length === 0);
        }

        // --- Core Operational Mutators ---

        function createCube(x = 0, y = 0.5, z = 0, colorHex = null) {
            saveHistoryState(); // Log history block before change happens

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const chosenColor = colorHex || document.getElementById('mesh-color').value;
            const material = new THREE.MeshStandardMaterial({ color: chosenColor, roughness: 0.4 });
            
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            scene.add(cube);
            cubes.push(cube);
            selectObject(cube);
        }

        function deleteSelected() {
            if (selectedObject) {
                saveHistoryState();
                scene.remove(selectedObject);
                cubes = cubes.filter(c => c !== selectedObject);
                selectObject(null);
            }
        }

        function selectObject(object) {
            selectedObject = object;
            if (selectedObject) {
                selectionBox.visible = true;
                selectionBox.position.copy(selectedObject.position);
                selectionBox.scale.copy(selectedObject.scale);
                
                document.getElementById('scale-x').value = selectedObject.scale.x;
                document.getElementById('scale-y').value = selectedObject.scale.y;
                document.getElementById('scale-z').value = selectedObject.scale.z;
                document.getElementById('mesh-color').value = "#" + selectedObject.material.color.getHexString();
            } else {
                selectionBox.visible = false;
            }
        }

        // --- Global Interactions & Events ---

        // Unified Pointer Handler (Handles Mouse Click + Mobile Tap selection flawlessly)
        function handlePointerSelection(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubes);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'CANVAS') {
                handlePointerSelection(e.clientX, e.clientY);
            }
        });

        // Sliders & Controls inputs listeners
        document.getElementById('add-cube-btn').addEventListener('click', () => {
            const offset = (Math.random() - 0.5) * 3;
            createCube(offset, 0.5, offset);
        });
        document.getElementById('delete-cube-btn').addEventListener('click', deleteSelected);
        
        // History triggers
        document.getElementById('undo-btn').addEventListener('click', undo);
        document.getElementById('redo-btn').addEventListener('click', redo);

        // Live Transformations adjustments
        function updateScale() {
            if (selectedObject) {
                // We don't flood history with every pixel dragged, save state on interaction drop could be added later
                const x = parseFloat(document.getElementById('scale-x').value);
                const y = parseFloat(document.getElementById('scale-y').value);
                const z = parseFloat(document.getElementById('scale-z').value);
                selectedObject.scale.set(x, y, z);
                selectionBox.scale.set(x, y, z);
            }
        }
        ['scale-x', 'scale-y', 'scale-z'].forEach(id => document.getElementById(id).addEventListener('input', updateScale));

        // Color updates
        document.getElementById('mesh-color').addEventListener('input', (e) => {
            if (selectedObject) {
                selectedObject.material.color.set(e.target.value);
            }
        });

        document.getElementById('bg-color').addEventListener('input', (e) => {
            scene.background.set(e.target.value);
        });

        // Light intensities adjustments
        document.getElementById('ambient-intensity').addEventListener('input', (e) => {
            ambientLight.intensity = parseFloat(e.target.value);
        });
        document.getElementById('sun-intensity').addEventListener('input', (e) => {
            sunLight.intensity = parseFloat(e.target.value);
        });

        // --- Save / Load Feature (Local Storage State Preservation) ---
        document.getElementById('save-btn').addEventListener('click', () => {
            const projectData = cubes.map(c => ({
                position: [c.position.x, c.position.y, c.position.z],
                scale: [c.scale.x, c.scale.y, c.scale.z],
                color: c.material.color.getHexString()
            }));
            localStorage.setItem('derp_3d_project', JSON.stringify(projectData));
            alert('Project saved successfully to browser local storage!');
        });

        document.getElementById('load-btn').addEventListener('click', () => {
            const rawData = localStorage.getItem('derp_3d_project');
            if (!rawData) {
                alert('No saved project payload found!');
                return;
            }
            saveHistoryState();
            const projectData = JSON.parse(rawData);
            
            cubes.forEach(c => scene.remove(c));
            cubes = [];
            
            projectData.forEach(data => {
                const geom = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({ color: parseInt(data.color, 16), roughness: 0.4 });
                const cube = new THREE.Mesh(geom, mat);
                cube.position.fromArray(data.position);
                cube.scale.fromArray(data.scale);
                cube.castShadow = true;
                cube.receiveShadow = true;
                scene.add(cube);
                cubes.push(cube);
            });
            selectObject(null);
        });

        // Key shortcuts
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                undo();
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                redo();
            }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                deleteSelected();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Spawn initial element
        createCube(0, 0.5, 0);
        undoStack.length = 0; // Don't allow undoing the default initialization block
        updateHistoryButtons();

        // Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (selectedObject) {
                selectionBox.position.copy(selectedObject.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
